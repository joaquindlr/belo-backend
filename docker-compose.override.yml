services:
  api:
    depends_on:
      seed:
        condition: service_completed_successfully

  seed:
    build: .
    container_name: belo-seed
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      NODE_ENV: development
    command: node dist/scripts/seed.js
